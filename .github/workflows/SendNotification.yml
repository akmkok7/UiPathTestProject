name: Acceptance Environment
on:
  workflow_dispatch:
  #push:
   # branches: main
    #paths:
     # - 'project.json'
      #- 'Main.xaml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Runner workspace path
        run: |
          echo "Cleaning up previous run"
          rm -rf "${{ github.workspace }}"
  build-uipath-nuget-package:
    # You should be able to run on windows 2019 or windows latest
    needs: cleanup
    runs-on: windows-latest
    steps: 
      - name: Check out repository code
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v4
      - name: Build Nuget Package
        uses: akmkok7/Arun-RPA-UiPath-Pack@v1.1.0
      - name: Upload UiPath Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: |
           package/*.*
           
  publish-uipath-nuget-package-ACC:
    needs: build-uipath-nuget-package
    runs-on: windows-latest
    # Here the environment variable is declared in workflow level
    env:
      # Replace with your Orchestrator Values 
      ORCH_URL: https://cloud.uipath.com/
      #ORCH_TENANT: DefaultTenant
      ORCH_TENANT: Acceptance
      ORCH_AppAccount: BitsDesignProject
      ORCH_AppID: ${{ secrets.APPID }}
      ORCH_AppSecret: ${{ secrets.APPSECRET }}
      ORCH_FolderName: ${{ vars.FOLDERNAME_ACC }}
      ORCH_CreateProcess: ${{ vars.CREATEPROCESS_ACC }}
    steps: 
      - name: Download UiPath Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: package
      - name: Publish Nuget Package to ACC
        uses: akmkok7/Arun-RPA-UiPath-Deploy@v1.0.0
        with:
          packagesPath: ${{ github.workspace }}\package
          orchestratorTenant: Acceptance
          orchestratorAppAccount: BitsDesignProject
          orchestratorApplicationId: ${{ env.ORCH_AppID }}
          orchestratorApplicationSecret: ${{ env.ORCH_AppSecret }}
          orchestratorFolder: ${{ env.ORCH_FolderName }}
          orchestratorCreateProcess: ${{ env.ORCH_CreateProcess }}

       # REPLACE the "Read project.json" step with this:
      - name: Read project.json for notification
        id: read_project          # ← give it an id
        shell: pwsh
        run: |
          $project = Get-Content "package\project.json" | ConvertFrom-Json
          echo "process_name=$($project.name)" >> $env:GITHUB_OUTPUT
          echo "version=$($project.projectVersion)" >> $env:GITHUB_OUTPUT

      # REPLACE the email step references like this:
      - name: Notify Developer - ACC Deploy Done
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[ACTION REQUIRED] ${{ steps.read_project.outputs.process_name }} v${{ steps.read_project.outputs.version }} - Test in Acceptance"
          to: ${{ secrets.GMAIL_USER }}
          from: ${{ secrets.GMAIL_USER }}
          body: |
            Hi,

            Process "${{ steps.read_project.outputs.process_name }}" version ${{ steps.read_project.outputs.version }} has been 
            successfully deployed to the Acceptance environment.

            Please test the bot in UiPath Orchestrator Acceptance tenant.

            Once testing is done, go to GitHub Actions and trigger:
            "2 - Generate MTP and Get SME Approval"
            
            Link: https://github.com/${{ github.repository }}/actions

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Regards,
            Release Pipeline Bot
